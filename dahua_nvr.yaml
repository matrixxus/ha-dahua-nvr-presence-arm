# ═══════════════════════════════════════════════════════════════════════════════
#  Dahua NVR Arm / Disarm — packages/dahua_nvr.yaml
#
#  Provides the entities needed for the Dahua NVR Presence Arm blueprint.
#  The automations are NOT in this file — import the companion blueprint.
#
#  Controls DisableLinkage on the NVR via CGI API:
#    DisableLinkage.Enable = true  → linkage DISABLED → cameras "disarmed"
#    DisableLinkage.Enable = false → linkage ENABLED  → cameras "armed"
#
#  SETUP:
#  1. Add to secrets.yaml:
#       dahua_user: "admin"
#       dahua_password: "your_password"
#  2. Update the NVR IP address below
#  3. Add household members to the group
#  4. Copy this file to /config/packages/dahua_nvr.yaml
#  5. Restart Home Assistant
#  6. Import the companion blueprint and create an automation from it
#
#  Generated entity IDs:
#    sensor.dahua_nvr_disarm_state  — REST poll sensor
#    switch.cameras_armed           — template switch toggle (verify after first boot)
#    group.household                — presence group
# ═══════════════════════════════════════════════════════════════════════════════

# ---------------------------------------------------------------------------
# Group: household members for presence tracking
# Add all person entities for people living in your home.
# The group state is "home" if ANY member is home,
# and "not_home" only when ALL members are away.
# ---------------------------------------------------------------------------
group:
  household:
    name: Household
    entities:
      - person.CHANGE_ME
      # - person.another_person

# ---------------------------------------------------------------------------
# REST sensor: polls NVR for current DisableLinkage state
# Change the IP address to match your NVR.
# ---------------------------------------------------------------------------
sensor:
  - platform: rest
    unique_id: dahua_nvr_disarm_state
    name: Dahua NVR Disarm State
    resource: "http://YOUR_NVR_IP/cgi-bin/configManager.cgi?action=getConfig&name=DisableLinkage"
    username: !secret dahua_user
    password: !secret dahua_password
    authentication: digest
    scan_interval: 60
    value_template: >
      {% if value is defined and 'true' in value %}
        disarmed
      {% elif value is defined and 'false' in value %}
        armed
      {% else %}
        unknown
      {% endif %}

# ---------------------------------------------------------------------------
# REST commands: arm / disarm the NVR
# Change the IP address to match your NVR.
# ---------------------------------------------------------------------------
rest_command:
  dahua_disarm:
    url: "http://YOUR_NVR_IP/cgi-bin/configManager.cgi?action=setConfig&DisableLinkage[0].Enable=true"
    method: GET
    username: !secret dahua_user
    password: !secret dahua_password
    authentication: digest

  dahua_arm:
    url: "http://YOUR_NVR_IP/cgi-bin/configManager.cgi?action=setConfig&DisableLinkage[0].Enable=false"
    method: GET
    username: !secret dahua_user
    password: !secret dahua_password
    authentication: digest

# ---------------------------------------------------------------------------
# Template switch: presents arm/disarm as a toggle in the UI
# NOTE: The entity ID is generated by HA on first boot. Check Developer Tools
#       → States and search for "cameras" or "dahua_nvr_armed" to find it.
#       It will likely be switch.cameras_armed but may vary.
# ---------------------------------------------------------------------------
template:
  - switch:
      - name: Cameras Armed
        unique_id: dahua_nvr_armed
        icon: >
          {% if is_state('sensor.dahua_nvr_disarm_state', 'armed') %}
            mdi:cctv
          {% else %}
            mdi:cctv-off
          {% endif %}
        availability: >
          {{ states('sensor.dahua_nvr_disarm_state') in ['armed', 'disarmed'] }}
        state: >
          {{ is_state('sensor.dahua_nvr_disarm_state', 'armed') }}
        turn_on:
          - action: rest_command.dahua_arm
          - delay:
              seconds: 2
          - action: homeassistant.update_entity
            target:
              entity_id: sensor.dahua_nvr_disarm_state
        turn_off:
          - action: rest_command.dahua_disarm
          - delay:
              seconds: 2
          - action: homeassistant.update_entity
            target:
              entity_id: sensor.dahua_nvr_disarm_state
